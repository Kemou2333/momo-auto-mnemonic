name: Update Progress Chart

on:
  push:
    branches: [main]
    paths:
      - 'processed.json'
      - 'scripts/gen_chart.py'
  workflow_dispatch:

jobs:
  chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate chart
        run: python3 scripts/gen_chart.py

      - name: Commit chart
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart.svg
          git diff --cached --quiet || git commit -m "chore: update progress chart"
          git push
